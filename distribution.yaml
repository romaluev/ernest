name: ernest
version: 2.0.0
description: CEO operating clone on Hermes — connects real apps via Composio, drafts in the CEO's voice, self-improves. Reuse-first.
hermes_requires: ">=0.12.0"
author: Notiky
license: MIT

env_requires:
  - name: ANTHROPIC_API_KEY
    description: Anthropic API key (direct Claude API — Ernest uses provider anthropic)
    required: true
  - name: COMPOSIO_API_KEY
    description: Composio key — connects HubSpot, Outlook, Slack, Calendar, Gmail (app.composio.dev)
    required: true
  - name: OBSIDIAN_VAULT_PATH
    description: Absolute path to the CEO's Obsidian vault (Ernest's long-term memory)
    required: true
  - name: RAILWAY_API_TOKEN
    description: Railway account token (railway.app/account/tokens) — CLI on VPS, no browser
    required: false
  - name: RAILWAY_TOKEN
    description: Railway project token (Project → Settings → Tokens) — headless railway up
    required: false

distribution_owned:
  - SOUL.md
  - config.yaml
  - ernest.yaml
  - skills/
  - cron/
  - plugins/
  - memory/
  - scripts/

description: |
  Ernest - CEO operating clone on Hermes. Connects real apps via Composio,
  remembers in an Obsidian vault, drafts draft-first in the CEO's voice, and
  self-improves by composing vetted installed skills.

ernest:
  role: ceo-clone
  primary_surface: desktop
  runtime: hermes
  source_of_truth: hubspot
  email_provider: outlook
  memory_backend: obsidian
  connector: composio

scope:
  read:
    - "**"
  write:
    - "memory/**"
    - "${OBSIDIAN_VAULT_PATH}/**"
  deny:
    - "**/.env"
    - "**/*secret*"
    - "**/*token*"
    - "**/private/**"

token_budgets:
  tier1_max: 9000
  tier2_max: 2500
  tier3_per_query_max: 3000
  tier3_turn_budget: 9000

approval_defaults:
  reads: 0
  internal_writes: 1
  external_drafts: 2
  external_publish: 2
  connector_install: 2
  permission_escalation: 3
  money_or_legal: 3

quality:
  north_star:
    friction_axis: "edit_distance_draft_to_sent"
    outcome_axis: "reply_or_meeting_or_deal_or_hire"
  gates:
    - draft_only
    - voice_match
    - claim_grounding
    - specificity
    - human_approval

# Watch-first: ambient crons remind; drafts only on explicit CEO ask.
watchers:
  mode: remind_only
  concerns_file: "memory/standing-concerns.md"
  default_staleness_days: 7
  card_dir: "${OBSIDIAN_VAULT_PATH}/Ernest/00-Watch"
  card_trigger_phrase: "draft these"

# HubSpot hygiene cron — sole bounded auto-write exception (mechanical only).
hygiene_policy:
  job_id: ernest-hubspot-hygiene
  dry_run: true
  approved: false
  mechanical_allowlist:
    - strip_junk_symbols
    - trim_whitespace
    - exact_dedupe
  mechanical_fields:
    - company
    - firstname
    - lastname
    - jobtitle
  propose_only:
    - translate_company_names
    - infer_status
    - infer_priority
    - fuzzy_dedupe
    - create_deals
  snapshot_dir: "${OBSIDIAN_VAULT_PATH}/Ernest/Hygiene/snapshots"
  audit_log: "logs/hygiene-audit.log"
  active_run_marker: "logs/hygiene-active-run.json"
